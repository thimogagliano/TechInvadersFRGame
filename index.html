<!DOCTYPE html>
<html lang="en">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
    /* ... (Keep your existing body and game-container CSS) ... */

    .brand {
        font-size: 12px;
        margin-bottom: 20px;
        color: #ffffff;
    }

    .game-title {
        font-size: 48px;
        color: #ffcc00;
        /* Yellow text */
        text-shadow: 4px 4px 0px #aa00ff;
        /* 3D purple shadow effect */
        line-height: 1.2;
        margin: 0 0 30px 0;
    }

    .mission-text {
        font-size: 16px;
        line-height: 1.8;
        margin-bottom: 50px;
    }

    .alien-decorators {
        font-size: 40px;
        margin-bottom: 40px;
    }

    #play-button {
        background-color: #aa00ff;
        /* Purple button */
        color: white;
        border: none;
        padding: 20px 40px;
        font-size: 18px;
        font-family: 'Press Start 2P', monospace;
        cursor: pointer;
        border-radius: 8px;
        transition: transform 0.2s, background-color 0.2s;
    }

    #play-button:hover {
        background-color: #cc44ff;
        transform: scale(1.05);
    }

    .input-modal {
        background-color: #2a2a2a;
        padding: 40px;
        border-radius: 12px;
        text-align: center;
        border: 2px solid #555;
    }

    #player-name-input {
        display: block;
        width: 100%;
        padding: 15px;
        margin-bottom: 20px;
        font-family: 'Courier, monospace';
        font-size: 18px;
        border: none;
        border-radius: 6px;
        box-sizing: border-box;
    }

    #submit-name-button {
        background-color: #00cc66;
        /* Green submit button */
        color: white;
        border: none;
        padding: 15px 40px;
        font-size: 18px;
        font-family: 'Press Start 2P', monospace;
        cursor: pointer;
        border-radius: 6px;
    }

    #submit-name-button:hover {
        background-color: #00ee77;
    }

    /* --- NEW: MOBILE SAFE ZONES --- */
    /* This rule only activates on screens smaller than 768px wide (phones and small tablets) */
    @media (max-width: 768px) {

        #start-screen,
        #name-input-screen,
        #game-container {
            top: 100px !important;
            /* Forces the interface down 100px from the top */

            /* 100px top margin + 150px bottom margin = 250px total space removed */
            height: calc(100% - 250px) !important;

            width: calc(100% - 32px) !important;
            /* Maintains the 16px side margins */
        }
    }
</style>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tech Invaders</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>

<body>
    <div id="start-screen">
        <div class="content-wrapper">
            <p class="brand">TAITO</p>
            <h1 class="game-title">TECH<br>INVADERS</h1>
            <p class="mission-text">PROTECT EARTH<br>FROM THE EVIL<br>SUPER COMPUTERS</p>

            <div class="alien-decorators">
                <span class="alien left-alien">👾</span>
                <span class="alien right-alien">👽</span>
            </div>

            <button id="play-button">PLAY GAME</button>
        </div>
    </div>

    <div id="name-input-screen" style="display: none;">
        <div class="input-modal">
            <input type="text" id="player-name-input" placeholder="Type your name here" maxlength="15"
                autocomplete="off">
            <p id="name-error-msg"
                style="color: #ff4444; font-family: 'Courier', monospace; font-size: 14px; min-height: 20px; margin-top: 0; margin-bottom: 15px;">
            </p>
            <button id="submit-name-button">submit</button>
        </div>
    </div>

    <div id="game-container"></div>

    <script src="game.js"></script>
</body>

</html>
